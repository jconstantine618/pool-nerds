<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients for the beaker liquid glow -->
    <linearGradient id="beakerGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4dd0e1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00bcd4;stop-opacity:1" />
    </linearGradient>

    <!-- Glow effect for the beaker -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Bright glow for bubbles -->
    <filter id="brightGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Body/Torso -->
  <ellipse cx="200" cy="280" rx="60" ry="80" fill="#00a0bb" stroke="#0c2340" stroke-width="2"/>

  <!-- Hawaiian Shirt Pattern Base -->
  <rect x="145" y="230" width="110" height="90" rx="8" fill="#7dd3f0" stroke="#0c2340" stroke-width="2"/>

  <!-- Tropical flowers on shirt - red/pink flowers -->
  <g id="flowers">
    <!-- Left side flower -->
    <circle cx="160" cy="250" r="4" fill="#e74c3c" opacity="0.8"/>
    <circle cx="155" cy="245" r="3" fill="#e74c3c" opacity="0.8"/>
    <circle cx="165" cy="245" r="3" fill="#e74c3c" opacity="0.8"/>
    <circle cx="155" cy="255" r="3" fill="#e74c3c" opacity="0.8"/>
    <circle cx="165" cy="255" r="3" fill="#e74c3c" opacity="0.8"/>
    <circle cx="160" cy="248" r="2" fill="#fdd835"/>

    <!-- Right side flower -->
    <circle cx="240" cy="270" r="4" fill="#e74c3c" opacity="0.8"/>
    <circle cx="235" cy="265" r="3" fill="#e74c3c" opacity="0.8"/>
    <circle cx="245" cy="265" r="3" fill="#e74c3c" opacity="0.8"/>
    <circle cx="235" cy="275" r="3" fill="#e74c3c" opacity="0.8"/>
    <circle cx="245" cy="275" r="3" fill="#e74c3c" opacity="0.8"/>
    <circle cx="240" cy="268" r="2" fill="#fdd835"/>

    <!-- Top center flower -->
    <circle cx="200" cy="240" r="3" fill="#e74c3c" opacity="0.8"/>
    <circle cx="196" cy="237" r="2" fill="#e74c3c" opacity="0.8"/>
    <circle cx="204" cy="237" r="2" fill="#e74c3c" opacity="0.8"/>
    <circle cx="196" cy="243" r="2" fill="#e74c3c" opacity="0.8"/>
    <circle cx="204" cy="243" r="2" fill="#e74c3c" opacity="0.8"/>
    <circle cx="200" cy="240" r="1.5" fill="#fdd835"/>
  </g>

  <!-- Pool Nerds Logo on shirt -->
  <g id="logo">
    <rect x="175" y="295" width="50" height="20" rx="3" fill="#0c2340" stroke="#00bcd4" stroke-width="1.5"/>
    <text x="200" y="307" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#00bcd4" text-anchor="middle">POOL</text>
  </g>

  <!-- Left Arm -->
  <g id="leftArm">
    <ellipse cx="145" cy="260" rx="18" ry="55" fill="#f5c6a0" stroke="#0c2340" stroke-width="2" transform="rotate(-25 145 260)"/>
    <!-- Left hand holding beaker -->
    <circle cx="120" cy="190" r="16" fill="#f5c6a0" stroke="#0c2340" stroke-width="2"/>
    <!-- Fingers -->
    <circle cx="115" cy="175" r="5" fill="#f5c6a0" stroke="#0c2340" stroke-width="1.5"/>
    <circle cx="110" cy="180" r="5" fill="#f5c6a0" stroke="#0c2340" stroke-width="1.5"/>
  </g>

  <!-- Right Arm -->
  <g id="rightArm">
    <ellipse cx="255" cy="260" rx="18" ry="55" fill="#f5c6a0" stroke="#0c2340" stroke-width="2" transform="rotate(25 255 260)"/>
    <!-- Right hand giving thumbs up -->
    <circle cx="280" cy="190" r="16" fill="#f5c6a0" stroke="#0c2340" stroke-width="2"/>
    <!-- Thumb -->
    <ellipse cx="295" cy="175" rx="8" ry="14" fill="#f5c6a0" stroke="#0c2340" stroke-width="1.5" transform="rotate(-30 295 175)"/>
  </g>

  <!-- Left Leg -->
  <ellipse cx="175" cy="380" rx="18" ry="50" fill="#f5c6a0" stroke="#0c2340" stroke-width="2"/>
  <!-- Left Flip-flop -->
  <ellipse cx="175" cy="430" rx="22" ry="8" fill="#ff6b9d" stroke="#0c2340" stroke-width="2"/>
  <circle cx="175" cy="430" r="3" fill="#0c2340"/>

  <!-- Right Leg -->
  <ellipse cx="225" cy="380" rx="18" ry="50" fill="#f5c6a0" stroke="#0c2340" stroke-width="2"/>
  <!-- Right Flip-flop -->
  <ellipse cx="225" cy="430" rx="22" ry="8" fill="#ff6b9d" stroke="#0c2340" stroke-width="2"/>
  <circle cx="225" cy="430" r="3" fill="#0c2340"/>

  <!-- Bahama Shorts Pattern -->
  <g id="shorts">
    <!-- Base shorts -->
    <path d="M 175 310 L 165 340 Q 165 350 175 350 L 225 350 Q 235 350 235 340 L 225 310 Z" fill="#00bcd4" stroke="#0c2340" stroke-width="2"/>
    <!-- Teal pattern stripes -->
    <line x1="175" y1="315" x2="225" y2="315" stroke="#0c6b7d" stroke-width="2" opacity="0.6"/>
    <line x1="170" y1="325" x2="230" y2="325" stroke="#0c6b7d" stroke-width="2" opacity="0.6"/>
    <line x1="168" y1="335" x2="232" y2="335" stroke="#0c6b7d" stroke-width="2" opacity="0.6"/>
    <!-- Wave pattern details -->
    <path d="M 175 318 Q 180 320 185 318" stroke="#0c6b7d" stroke-width="1.5" fill="none" opacity="0.5"/>
    <path d="M 195 318 Q 200 320 205 318" stroke="#0c6b7d" stroke-width="1.5" fill="none" opacity="0.5"/>
    <path d="M 215 318 Q 220 320 225 318" stroke="#0c6b7d" stroke-width="1.5" fill="none" opacity="0.5"/>
  </g>

  <!-- Beaker in left hand -->
  <g id="beaker" filter="url(#glow)">
    <!-- Beaker body -->
    <path d="M 100 160 L 110 120 L 130 120 L 140 160 Z" fill="none" stroke="#0c2340" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Beaker rim -->
    <line x1="110" y1="118" x2="130" y2="118" stroke="#0c2340" stroke-width="2.5"/>
    <!-- Liquid inside beaker -->
    <path d="M 105 155 L 113 128 L 127 128 L 135 155 Z" fill="url(#beakerGradient)" opacity="0.9"/>
    <!-- Liquid surface shine -->
    <ellipse cx="120" cy="128" rx="8" ry="4" fill="#4dd0e1" opacity="0.6"/>

    <!-- Bubbles in liquid -->
    <circle cx="112" cy="145" r="3" fill="#4dd0e1" opacity="0.8" filter="url(#brightGlow)"/>
    <circle cx="125" cy="150" r="2.5" fill="#4dd0e1" opacity="0.8" filter="url(#brightGlow)"/>
    <circle cx="118" cy="135" r="2" fill="#4dd0e1" opacity="0.8" filter="url(#brightGlow)"/>
    <circle cx="130" cy="140" r="2" fill="#4dd0e1" opacity="0.8" filter="url(#brightGlow)"/>

    <!-- Rising bubbles above beaker -->
    <circle cx="108" cy="105" r="1.5" fill="#00bcd4" opacity="0.9" filter="url(#brightGlow)"/>
    <circle cx="115" cy="95" r="1" fill="#00bcd4" opacity="0.7" filter="url(#brightGlow)"/>
    <circle cx="130" cy="110" r="1.2" fill="#00bcd4" opacity="0.8" filter="url(#brightGlow)"/>
    <circle cx="122" cy="85" r="0.8" fill="#00bcd4" opacity="0.6" filter="url(#brightGlow)"/>
  </g>

  <!-- Head -->
  <circle cx="200" cy="160" r="85" fill="#f5c6a0" stroke="#0c2340" stroke-width="2.5"/>

  <!-- Hair - Spiky Brown -->
  <g id="hair" fill="#6d4c2a">
    <!-- Left side spikes -->
    <polygon points="140,130 130,100 135,125" fill="#6d4c2a" stroke="#0c2340" stroke-width="1.5"/>
    <polygon points="135,110 120,70 130,105" fill="#6d4c2a" stroke="#0c2340" stroke-width="1.5"/>
    <polygon points="145,100 135,55 148,95" fill="#6d4c2a" stroke="#0c2340" stroke-width="1.5"/>

    <!-- Top center spikes -->
    <polygon points="190,85 185,35 190,80" fill="#6d4c2a" stroke="#0c2340" stroke-width="1.5"/>
    <polygon points="200,80 200,30 205,78" fill="#6d4c2a" stroke="#0c2340" stroke-width="1.5"/>
    <polygon points="210,85 215,35 210,80" fill="#6d4c2a" stroke="#0c2340" stroke-width="1.5"/>

    <!-- Right side spikes -->
    <polygon points="255,110 270,70 260,105" fill="#6d4c2a" stroke="#0c2340" stroke-width="1.5"/>
    <polygon points="260,100 275,55 252,95" fill="#6d4c2a" stroke="#0c2340" stroke-width="1.5"/>
    <polygon points="265,130 280,100 270,125" fill="#6d4c2a" stroke="#0c2340" stroke-width="1.5"/>

    <!-- Back/top hair base -->
    <ellipse cx="200" cy="110" rx="75" ry="50" fill="#6d4c2a" opacity="0.7"/>
  </g>

  <!-- Eyes -->
  <g id="eyes">
    <!-- Left eye white -->
    <ellipse cx="165" cy="155" rx="22" ry="28" fill="white" stroke="#0c2340" stroke-width="2"/>
    <!-- Left pupil -->
    <circle cx="165" cy="162" r="12" fill="#0c2340"/>
    <!-- Left pupil highlight -->
    <circle cx="168" cy="158" r="5" fill="white" opacity="0.8"/>

    <!-- Right eye white -->
    <ellipse cx="235" cy="155" rx="22" ry="28" fill="white" stroke="#0c2340" stroke-width="2"/>
    <!-- Right pupil -->
    <circle cx="235" cy="162" r="12" fill="#0c2340"/>
    <!-- Right pupil highlight -->
    <circle cx="238" cy="158" r="5" fill="white" opacity="0.8"/>
  </g>

  <!-- Oversized Black-Rimmed Glasses -->
  <g id="glasses" fill="none" stroke="#1a1a1a" stroke-width="3">
    <!-- Left lens -->
    <rect x="140" y="130" width="50" height="50" rx="8" fill="none" stroke="#1a1a1a" stroke-width="3"/>
    <!-- Right lens -->
    <rect x="210" y="130" width="50" height="50" rx="8" fill="none" stroke="#1a1a1a" stroke-width="3"/>
    <!-- Bridge -->
    <line x1="190" y1="155" x2="210" y2="155" stroke="#1a1a1a" stroke-width="3"/>
    <!-- Left temple -->
    <line x1="140" y1="145" x2="115" y2="140" stroke="#1a1a1a" stroke-width="2.5"/>
    <!-- Right temple -->
    <line x1="260" y1="145" x2="285" y2="140" stroke="#1a1a1a" stroke-width="2.5"/>
  </g>

  <!-- Mouth - Huge Toothy Grin -->
  <g id="mouth">
    <!-- Mouth line -->
    <path d="M 175 210 Q 200 240 225 210" stroke="#0c2340" stroke-width="2.5" fill="none"/>
    <!-- Smile/gum area -->
    <path d="M 175 210 Q 200 235 225 210" fill="#d97d6b" opacity="0.6"/>

    <!-- Teeth - Upper row -->
    <g id="teeth">
      <rect x="177" y="210" width="6" height="12" fill="white" stroke="#0c2340" stroke-width="1"/>
      <rect x="185" y="208" width="6" height="14" fill="white" stroke="#0c2340" stroke-width="1"/>
      <rect x="193" y="206" width="6" height="16" fill="white" stroke="#0c2340" stroke-width="1"/>
      <rect x="201" y="206" width="6" height="16" fill="white" stroke="#0c2340" stroke-width="1"/>
      <rect x="209" y="208" width="6" height="14" fill="white" stroke="#0c2340" stroke-width="1"/>
      <rect x="217" y="210" width="6" height="12" fill="white" stroke="#0c2340" stroke-width="1"/>
    </g>
  </g>

  <!-- Eyebrows for confident expression -->
  <g id="eyebrows">
    <path d="M 145 125 Q 165 115 185 120" stroke="#6d4c2a" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 215 120 Q 235 115 255 125" stroke="#6d4c2a" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Cheeks/blush for friendly character -->
  <g id="cheeks">
    <circle cx="130" cy="175" r="12" fill="#ff9999" opacity="0.4"/>
    <circle cx="270" cy="175" r="12" fill="#ff9999" opacity="0.4"/>
  </g>

  <!-- Confidence lines around character for emphasis -->
  <g id="confidence-lines" stroke="#00bcd4" stroke-width="1.5" opacity="0.3" fill="none">
    <path d="M 85 160 Q 80 150 85 140" stroke-dasharray="3,3"/>
    <path d="M 315 160 Q 320 150 315 140" stroke-dasharray="3,3"/>
    <path d="M 95 220 Q 85 225 80 235" stroke-dasharray="3,3"/>
    <path d="M 305 220 Q 315 225 320 235" stroke-dasharray="3,3"/>
  </g>
</svg>